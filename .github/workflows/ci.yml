name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        run: npm test

      - name: Verify CLI help entrypoints
        run: |
          node src/cli.js --help
          node src/cli.js solve --help

      - name: Verify packed contents
        run: npm pack --dry-run

      - name: Verify global install from tarball
        run: |
          PACKAGE_TGZ="$(npm pack)"
          npm install -g "./${PACKAGE_TGZ}"
          shellgeiai --help

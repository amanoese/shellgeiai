name: Require version bump

on:
  pull_request:
    branches:
      - master

jobs:
  version-bump:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify package.json version increases over master
        run: |
          BASE_VERSION="$(git show origin/master:package.json | jq -r '.version')"
          HEAD_VERSION="$(jq -r '.version' package.json)"

          if [ "$(echo -e "${BASE_VERSION}\n${HEAD_VERSION}" | sort -V | tail -n 1)" != "$HEAD_VERSION" ] || [ "$BASE_VERSION" = "$HEAD_VERSION" ]; then
            echo "Version bump required: master has $BASE_VERSION, PR has $HEAD_VERSION."
            exit 1
          fi

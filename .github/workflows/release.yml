name: Publish to npm

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Validate release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          # Accept both `v0.1.1` and `0.1.1`.
          # Recommended convention:
          # - package.json version: 0.1.1
          # - GitHub Release tag: v0.1.1
          VERSION=$(node -pe 'require("./package.json").version')
          if [ "$RELEASE_TAG" != "v$VERSION" ] && [ "$RELEASE_TAG" != "$VERSION" ]; then
            echo "Release tag $RELEASE_TAG does not match package.json version $VERSION."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        run: npm test

      - name: Verify CLI help entrypoints
        run: |
          node src/cli.js --help
          node src/cli.js solve --help

      - name: Verify packed contents
        run: npm pack --dry-run

      - name: Publish package
        run: npm publish --provenance
